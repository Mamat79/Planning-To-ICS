name: Build macOS installer

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to receive the macOS installer
        required: true
        default: v2.0
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.release_tag }}"
          fi
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build user guide
        run: python tools/make_user_guide.py "output/pdf/Planning_to_ICS_V${{ steps.release.outputs.version }}_Notice.pdf" --version "V${{ steps.release.outputs.version }}"

      - name: Create macOS icon
        shell: bash
        run: |
          set -euo pipefail
          rm -rf assets/planning-to-ics.iconset
          mkdir -p assets/planning-to-ics.iconset
          for size in 16 32 128 256 512; do
            sips -z "$size" "$size" assets/planning-to-ics.png --out "assets/planning-to-ics.iconset/icon_${size}x${size}.png" >/dev/null
          done
          sips -z 32 32 assets/planning-to-ics.png --out assets/planning-to-ics.iconset/icon_16x16@2x.png >/dev/null
          sips -z 64 64 assets/planning-to-ics.png --out assets/planning-to-ics.iconset/icon_32x32@2x.png >/dev/null
          sips -z 256 256 assets/planning-to-ics.png --out assets/planning-to-ics.iconset/icon_128x128@2x.png >/dev/null
          sips -z 512 512 assets/planning-to-ics.png --out assets/planning-to-ics.iconset/icon_256x256@2x.png >/dev/null
          sips -z 1024 1024 assets/planning-to-ics.png --out assets/planning-to-ics.iconset/icon_512x512@2x.png >/dev/null
          iconutil -c icns assets/planning-to-ics.iconset -o assets/planning-to-ics.icns

      - name: Build application bundle
        env:
          PLANNING_RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: pyinstaller --noconfirm --clean "Planning To ICS.mac.spec"

      - name: Create DMG installer
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/dmg
          cp -R "dist/Planning To ICS.app" "dist/dmg/Planning To ICS.app"
          cp "output/pdf/Planning_to_ICS_V${{ steps.release.outputs.version }}_Notice.pdf" dist/dmg/
          ln -s /Applications dist/dmg/Applications
          hdiutil create \
            -volname "Planning To ICS" \
            -srcfolder "dist/dmg" \
            -ov \
            -format UDZO \
            "dist/Planning_to_ICS_V${{ steps.release.outputs.version }}_macOS.dmg"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Planning_to_ICS_V${{ steps.release.outputs.version }}_macOS
          path: |
            dist/Planning_to_ICS_V${{ steps.release.outputs.version }}_macOS.dmg
            output/pdf/Planning_to_ICS_V${{ steps.release.outputs.version }}_Notice.pdf

      - name: Upload installer to release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --verify-tag --title "Planning To ICS ${tag#v}" --notes "Paquet macOS de Planning To ICS."
          fi
          gh release upload "$tag" "dist/Planning_to_ICS_V${{ steps.release.outputs.version }}_macOS.dmg" --clobber
          gh release upload "$tag" "output/pdf/Planning_to_ICS_V${{ steps.release.outputs.version }}_Notice.pdf" --clobber
