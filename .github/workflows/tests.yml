name: Tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Installer les dépendances
        run: python -m pip install -r requirements-dev.txt
      - name: Tester
        run: python -m pytest
